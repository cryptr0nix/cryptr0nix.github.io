title: "Hindiba"
description: "Edebiyat, şiir ve günlük yazılar – modern, sakin bir blog."
url: "https://cryptr0nix.github.io"
baseurl: ""
lang: "tr"
timezone: "Europe/Istanbul"

# Yorum sistemi (giscus) ayarları
comments:
  provider: giscus
  giscus:
    repo: cryptr0nix/cryptr0nix.github.io
    repo_id: "R_kgDOH..."
    category: "General"
    category_id: "DIC_kwDOH..."
    mapping: "pathname"
    strict: 0
    reactions_enabled: "1"
    emit_metadata: 0
    theme: "preferred_color_scheme"
    lang: "tr"

collections:
  posts:
    output: true
    permalink: /:categories/:title/

plugins:
  - jekyll-seo-tag
  - jekyll-paginate
  - jekyll-feed
  - jekyll-sitemap

paginate: 6
paginate_path: "/sayfa/:num/"

markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      comments: true
      cover: ""  # isteğe bağlı kapak resmi URL'si
